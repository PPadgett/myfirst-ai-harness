name: harness-ci

on:
  push:
  pull_request:

concurrency:
  group: harness-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install -U pip
          pip install -e ".[test]"
      - name: Static compile
        run: python -m compileall -q harness real_ai_harness.py
      - name: Run unit tests
        run: pytest -q tests/unit

  integration:
    runs-on: ubuntu-latest
    needs: [unit]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install -U pip
          pip install -e ".[test]"
      - name: Run integration tests
        run: pytest -q tests/integration

  parity:
    runs-on: ubuntu-latest
    needs: [integration]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install -U pip
          pip install -e ".[test]"
      - name: Run parity sanity
        run: |
          mkdir -p tests/benchmarks
          python scripts/run_parity_sanity.py --max-cases 20 --print-json | tee tests/benchmarks/parity_sanity.json
      - name: Upload parity artifacts
        uses: actions/upload-artifact@v4
        with:
          name: parity-sanity-${{ matrix.python-version }}
          path: tests/benchmarks/parity_sanity.json
      - name: Upload parity runtime snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-runtime-snapshots-${{ matrix.python-version }}
          path: |
            tests/benchmarks/parity_sanity.json
            traces/**
            state/**

  benchmarks:
    runs-on: ubuntu-latest
    needs: [parity]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install -U pip
          pip install -e ".[test]"
      - name: Run trace regression
        run: |
          mkdir -p tests/benchmarks
          python tests/benchmarks/run_trace_regression.py \
            --route-category-threshold 0.90 \
            --status-threshold 0.90 \
            --next-action-threshold 0.90 \
            --permission-threshold 0.95 \
            --evidence-presence-threshold 0.95 \
            --validation-threshold 0.95
      - name: Upload benchmark summary
        uses: actions/upload-artifact@v4
        with:
          name: trace-regression-${{ matrix.python-version }}
          path: tests/benchmarks/trace_regression.json
      - name: Upload benchmark runtime snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-runtime-snapshots-${{ matrix.python-version }}
          path: |
            traces/**
            state/**
