backend:
  name: openai
  base_url: "http://127.0.0.1:11435/v1"
  api_key: null
  timeout_seconds: 120
  max_tokens: 768
  extra_headers: {}
  extra_body: {}

model: "local-foundation:v1"
corpus_dir: "corpus"
trace_dir: "traces"
cache_dir: ".cache"
enable_cache: true
max_cache_entries: 2000

tool_allowlist:
  - "calculator"
  - "time_now"
  - "new_uuid"

route_manifest_path: "real_harness_routes.yaml"

feature_level: "basic"
require_evidence: false
