services:
  nvidia-nim:
    profiles:
      - nvidia
    image: ${NIM_LLM_IMAGE}
    container_name: nvidia-nim
    # On Linux with legacy NVIDIA runtime:
    # runtime: nvidia
    # On Docker Desktop (Windows/PowerShell + WSL2), use device_requests instead:
    # If you use this compose file on Linux with runtime support, delete device_requests.
    # Keep in mind some NIM images may not include curl/wget. If healthcheck fails,
    # remove or replace with your image-specific check and rely on harness startup validation.
    device_requests:
      - driver: nvidia
        count: all
        capabilities:
          - gpu
    ports:
      - "8000:8000"
    volumes:
      - ${NIM_CACHE_DIR:-./.nim-cache}:/opt/nim/.cache
    environment:
      NIM_SERVER_PORT: ${NIM_SERVER_PORT:-8000}
      NIM_MODEL_PATH: ${NIM_MODEL_PATH}
      NIM_MODEL_PROFILE: ${NIM_MODEL_PROFILE}
      HF_TOKEN: ${HF_TOKEN}
      NGC_API_KEY: ${NGC_API_KEY}
      NGC_CLI_API_KEY: ${NGC_CLI_API_KEY}
      MODELSCOPE_API_TOKEN: ${MODELSCOPE_API_TOKEN}
      NIM_LOG_LEVEL: ${NIM_LOG_LEVEL:-INFO}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    shm_size: "16gb"
    healthcheck:
      test: ["CMD-SHELL", "if command -v curl >/dev/null 2>&1; then curl -sf http://localhost:8000/v1/models >/dev/null; elif command -v wget >/dev/null 2>&1; then wget -qO- http://localhost:8000/v1/models >/dev/null; else exit 1; fi"]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  ollama:
    profiles:
      - ollama
    image: ${OLLAMA_IMAGE}
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ${OLLAMA_MODEL_DIR:-./.ollama}:/root/.ollama
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-0.0.0.0}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
    command: ["serve"]
    healthcheck:
      test: ["CMD-SHELL", "if command -v curl >/dev/null 2>&1; then curl -sf http://localhost:11434/v1/models >/dev/null; elif command -v wget >/dev/null 2>&1; then wget -qO- http://localhost:11434/v1/models >/dev/null; else exit 1; fi"]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  harness:
    profiles:
      - nvidia
      - ollama
    build:
      context: .
      dockerfile: Dockerfile
    container_name: harness-api
    depends_on:
      nvidia-nim:
        condition: service_healthy
        required: false
      ollama:
        condition: service_healthy
        required: false
    ports:
      - "8080:8080"
    volumes:
      - ./:/app:ro
      - ./.cache:/app/.cache
      - ./traces:/app/traces
      - ./corpus:/app/corpus:ro
      - ${HARNESS_CONFIG:-./harness.yaml}:/app/harness.yaml:ro
    environment:
      HARNESS_BACKEND: ${HARNESS_BACKEND}
      HARNESS_BASE_URL: ${HARNESS_BASE_URL}
      HARNESS_MODEL: ${HARNESS_MODEL}
      HARNESS_API_KEY: ${HARNESS_API_KEY}
      HARNESS_CACHE_DIR: /app/.cache
      HARNESS_TRACE_DIR: /app/traces
      HARNESS_CORPUS: /app/corpus
    command: ["harnessd", "--host", "0.0.0.0", "--port", "8080", "--config", "/app/harness.yaml"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5).read()\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 15s
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
