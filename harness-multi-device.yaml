backends:
  - id: npu
    name: openai
    base_url: "http://127.0.0.1:11433/v1"
    model: "qwen3:4b"
    api_key: null
    timeout_seconds: 120
    max_tokens: 768
    capabilities: ["npu", "hybrid"]
    device: npu
    max_context: 4096
    max_output_tokens: 768
    max_concurrency: 1
    health_endpoint: "http://127.0.0.1:11433/health"
  - id: gpu
    name: openai
    base_url: "http://127.0.0.1:11434/v1"
    model: "qwen3:4b"
    api_key: null
    timeout_seconds: 120
    max_tokens: 1024
    capabilities: ["gpu", "hybrid"]
    device: gpu
    max_context: 4096
    max_output_tokens: 1024
    max_concurrency: 2
    health_endpoint: "http://127.0.0.1:11434/health"
  - id: cpu
    name: openai
    base_url: "http://127.0.0.1:11435/v1"
    model: "qwen3:4b"
    api_key: null
    timeout_seconds: 120
    max_tokens: 1024
    capabilities: ["cpu"]
    device: cpu
    max_context: 2048
    max_output_tokens: 1024
    max_concurrency: 4
    health_endpoint: "http://127.0.0.1:11435/health"

model: "qwen3:4b"
corpus_dir: "corpus"
trace_dir: "traces"
cache_dir: ".cache"
enable_cache: true
max_cache_entries: 2000

route_backend_defaults:
  direct:
    prefer_device: npu
    fallback_chain:
      - npu
      - gpu
      - cpu
    latency_class: interactive
    max_output_tokens: 512
  grounded_qa:
    prefer_device: hybrid
    fallback_chain:
      - gpu
      - npu
      - cpu
    latency_class: balanced
    max_context: 3200
  structured_extraction:
    prefer_device: gpu
    latency_class: batch-heavy
    max_context: 4096
  tool_required:
    prefer_device: cpu
    latency_class: batch-heavy
    max_output_tokens: 1024
  code_or_data:
    prefer_device: gpu
    latency_class: balanced
  side_effecting_action:
    prefer_device: cpu
    latency_class: batch-heavy
    max_output_tokens: 512
  high_risk:
    prefer_device: cpu
    latency_class: batch-heavy
    max_output_tokens: 1024

route_manifest_path: "real_harness_routes.yaml"
feature_level: "basic"
require_evidence: false
